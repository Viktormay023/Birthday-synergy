<!DOCTYPE html>
<html>
<head>

<title>Практика синергия</title>
<style>
body {
    text-align: center;
    font-family: Arial;
}
img {
    width: 300px;
    height: 200px;
}
button {
    padding: 10px;
    margin: 10px;
}
</style>
</head>
<body>

<h2>Слайдер изображений синергия</h2>

<img id="slider" src="https://picsum.photos/300/200?1">
<br>

<button onclick="prev()">Back</button>
<button onclick="next()">Forward</button>

<p id="counter"></p>

<script>
let images = [
    "https://sys3.ru/synergy-api/uploads/images/OG_1200x630_tg_fb_tw.png",
    "https://picsum.photos/300/200?2",
    "https://picsum.photos/300/200?3"
];

let index = 0;

function showImage() {
    document.getElementById("slider").src = images[index];
    document.getElementById("counter").innerText =
        "Изображение " + (index+1) + " из " + images.length;
}

function next() {
    index++;
    if (index >= images.length) {
        index = 0;
    }
    showImage();
}


function prev() {
    index--;
    if (index < 0) {
        index = images.length - 1;
    }
    showImage();
}

showImage();
</script>

</body>
</html>
